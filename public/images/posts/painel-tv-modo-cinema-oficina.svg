<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a12" />
  <!-- Grid -->
  <path d="M 0 0 L 1200 0 L 1200 630 L 0 630 Z" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.1"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0ea5e9" stroke-width="0.5" opacity="0.2"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />
  
  <g transform="translate(150, 100)" opacity="0.8">
    <!-- Screen frame -->
    <rect x="0" y="0" width="900" height="450" rx="15" fill="#050508" stroke="#06b6d4" stroke-width="4" />
    
    <!-- Heatmap blocks -->
    <rect x="50" y="50" width="380" height="150" rx="10" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="2" />
    <rect x="470" y="50" width="380" height="150" rx="10" fill="#0ea5e9" fill-opacity="0.2" stroke="#0ea5e9" stroke-width="2" />
    
    <rect x="50" y="250" width="380" height="150" rx="10" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="2" />
    <rect x="470" y="250" width="380" height="150" rx="10" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="2" stroke-dasharray="10 5" />
    
    <!-- Abstract data lines -->
    <path d="M 70 120 L 400 120" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
    <path d="M 490 120 L 820 120" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"/>
    
    <path d="M 70 320 L 400 320" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
    <path d="M 490 320 L 820 320" stroke="#ef4444" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
