<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#09090b" />
  
  <defs>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.1" />
    </linearGradient>
    <radialGradient id="successGlow" cx="70%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#09090b" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#successGlow)" />

  <g opacity="0.8">
    <!-- Left Side: Failing CRM (Manual Data Entry) -->
    <rect x="150" y="200" width="200" height="250" rx="10" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="10 10"/>
    
    <!-- Broken/Incomplete forms inside -->
    <rect x="180" y="240" width="140" height="15" rx="5" fill="#ef4444" opacity="0.2"/>
    <rect x="180" y="280" width="100" height="15" rx="5" fill="#ef4444" opacity="0.2"/>
    <rect x="180" y="320" width="80" height="15" rx="5" fill="#ef4444" opacity="0.2"/>
    <path d="M 170 370 L 330 430 M 170 430 L 330 370" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Heavy/falling arrows indicating failure -->
    <path d="M 400 350 Q 450 450 420 520" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6"/>

    <!-- Center/Right Side: Automated AI CRM (Fluid, Connected) -->
    <!-- Voice/Chat converting to structured data -->
    <path d="M 500 250 C 600 150, 700 450, 800 250 C 900 150, 1000 450, 1100 250" fill="none" stroke="#0ea5e9" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    <path d="M 500 300 C 600 200, 700 500, 800 300 C 900 200, 1000 500, 1100 300" fill="none" stroke="#06b6d4" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Structured clean blocks emerging -->
    <rect x="750" y="150" width="150" height="40" rx="20" fill="#050508" stroke="#0ea5e9" stroke-width="3"/>
    <rect x="850" y="350" width="180" height="40" rx="20" fill="#050508" stroke="#06b6d4" stroke-width="3"/>
    <rect x="650" y="450" width="120" height="40" rx="20" fill="#050508" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="5 5"/>
    
    <!-- Particles floating up (success) -->
    <circle cx="825" cy="170" r="8" fill="#0ea5e9" />
    <circle cx="940" cy="370" r="8" fill="#06b6d4" />
    <circle cx="710" cy="470" r="8" fill="#0ea5e9" />
    
    <!-- AI spark in the middle resolving the connection -->
    <circle cx="550" cy="300" r="40" fill="none" stroke="#06b6d4" stroke-width="4" stroke-dasharray="12 8"/>
    <circle cx="550" cy="300" r="15" fill="#0ea5e9"/>
  </g>
</svg>
