<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#09090b" />
  
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <g opacity="0.9">
    <!-- Block of complex technical text translating to simple accepted check -->
    
    <!-- Left: Complex/Red -->
    <rect x="200" y="200" width="250" height="250" rx="15" fill="none" stroke="#ef4444" stroke-width="4"/>
    <rect x="230" y="240" width="190" height="10" fill="#ef4444" opacity="0.5"/>
    <rect x="230" y="270" width="160" height="10" fill="#ef4444" opacity="0.5"/>
    <rect x="230" y="300" width="140" height="10" fill="#ef4444" opacity="0.5"/>
    <rect x="230" y="330" width="180" height="10" fill="#ef4444" opacity="0.5"/>
    <circle cx="325" cy="400" r="20" fill="none" stroke="#ef4444" stroke-width="4"/>
    <line x1="315" y1="390" x2="335" y2="410" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="335" y1="390" x2="315" y2="410" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>

    <!-- Middle: AI Translation Wave -->
    <path d="M 500 325 Q 600 150 700 325" fill="none" stroke="url(#aiGradient)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 500 325 Q 600 500 700 325" fill="none" stroke="url(#aiGradient)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="600" cy="325" r="30" fill="#09090b" stroke="#0ea5e9" stroke-width="4"/>
    <circle cx="600" cy="325" r="10" fill="#22c55e" />

    <!-- Right: Simplified Green/Approved -->
    <rect x="750" y="200" width="250" height="250" rx="15" fill="none" stroke="#22c55e" stroke-width="4"/>
    <rect x="780" y="260" width="190" height="20" rx="5" fill="#22c55e" opacity="0.5"/>
    <circle cx="875" cy="360" r="30" fill="#22c55e" />
    <path d="M 860 360 L 870 370 L 890 350" fill="none" stroke="#09090b" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
