<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12" />
      <stop offset="100%" stop-color="#11111a" />
    </linearGradient>

    <!-- Glowing Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" />
      <circle cx="20" cy="20" r="1.5" fill="#0ea5e9" fill-opacity="0.15" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Abstract Tech Graphics (Representing Time and Automation) -->
  <g transform="translate(600, 315)">
    <!-- Expanding Circles (Time saving) -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="url(#accent-grad)" stroke-width="2" stroke-dasharray="10 15" />
    <circle cx="0" cy="0" r="220" fill="none" stroke="url(#accent-grad)" stroke-width="1.5" stroke-dasharray="5 20" />
    <circle cx="0" cy="0" r="300" fill="none" stroke="url(#accent-grad)" stroke-width="1" stroke-dasharray="2 30" />
    
    <!-- Central Node / Core -->
    <circle cx="0" cy="0" r="60" fill="#0ea5e9" fill-opacity="0.1" filter="url(#glow)" />
    <circle cx="0" cy="0" r="40" fill="none" stroke="#06b6d4" stroke-width="4" />
    <circle cx="0" cy="0" r="20" fill="#0ea5e9" />

    <!-- Clock / Gears abstraction -->
    <path d="M 0 -40 L 0 -100" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
    <path d="M 0 40 L 0 120" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" opacity="0.6" />
    <path d="M 40 0 L 80 0" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" opacity="0.6" />
    <path d="M -40 0 L -120 0" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" opacity="0.6" />
    <path d="M 28 28 L 60 60" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" opacity="0.8" />
    <path d="M -28 -28 L -70 -70" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" opacity="0.8" />

    <!-- Network connections -->
    <g stroke="#0ea5e9" stroke-width="1.5" opacity="0.5">
      <line x1="80" y1="0" x2="160" y2="-50" />
      <circle cx="160" cy="-50" r="6" fill="#0a0a12" stroke="#06b6d4" stroke-width="2"/>
      
      <line x1="60" y1="60" x2="120" y2="120" />
      <circle cx="120" cy="120" r="5" fill="#0a0a12" stroke="#06b6d4" stroke-width="2"/>
      
      <line x1="-120" y1="0" x2="-200" y2="40" />
      <circle cx="-200" cy="40" r="8" fill="#0a0a12" stroke="#06b6d4" stroke-width="2"/>

      <line x1="-70" y1="-70" x2="-140" y2="-100" />
      <circle cx="-140" cy="-100" r="4" fill="#0a0a12" stroke="#06b6d4" stroke-width="2"/>
    </g>
  </g>

  <!-- Decorative geometric elements -->
  <path d="M 100 500 L 250 500 L 300 450" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.4" />
  <circle cx="100" cy="500" r="4" fill="#0ea5e9" />
  <rect x="296" y="446" width="8" height="8" fill="none" stroke="#06b6d4" stroke-width="1.5" />

  <path d="M 1100 100 L 950 100 L 900 150" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.4" />
  <circle cx="1100" cy="100" r="4" fill="#0ea5e9" />
  <rect x="896" y="146" width="8" height="8" fill="none" stroke="#06b6d4" stroke-width="1.5" />
</svg>
