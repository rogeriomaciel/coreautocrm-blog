<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b" />
  
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#09090b" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Graph / Network shapes for "Follow-up / CRM Network" -->
  <g opacity="0.7">
    <!-- Main center nodes -->
    <circle cx="600" cy="315" r="250" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="10 15" />
    <circle cx="600" cy="315" r="180" fill="none" stroke="#0ea5e9" stroke-width="2" />
    
    <!-- Outer nodes and connecting lines representing clients -->
    <!-- Node 1 -->
    <path d="M 600 315 L 350 200" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
    <circle cx="350" cy="200" r="16" fill="#0a0a12" stroke="#06b6d4" stroke-width="4" />
    <!-- Node 2 -->
    <path d="M 600 315 L 850 150" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
    <circle cx="850" cy="150" r="20" fill="#0a0a12" stroke="#0ea5e9" stroke-width="4" />
    <!-- Node 3 -->
    <path d="M 600 315 L 400 500" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
    <circle cx="400" cy="500" r="12" fill="#0a0a12" stroke="#06b6d4" stroke-width="3" />
    <!-- Node 4 -->
    <path d="M 600 315 L 800 480" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
    <circle cx="800" cy="480" r="24" fill="#0ea5e9" />
    <circle cx="800" cy="480" r="35" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 4" />
    
    <!-- Central Core -->
    <circle cx="600" cy="315" r="40" fill="#0ea5e9" />
    <circle cx="600" cy="315" r="60" fill="none" stroke="#06b6d4" stroke-width="4" />
    
    <!-- Floating particles -->
    <circle cx="700" cy="200" r="5" fill="#06b6d4" opacity="0.8" />
    <circle cx="500" cy="400" r="4" fill="#0ea5e9" opacity="0.8" />
    <circle cx="900" cy="300" r="6" fill="#06b6d4" opacity="0.5" />
    <circle cx="300" cy="350" r="8" fill="#0ea5e9" opacity="0.5" />
  </g>
</svg>
