<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b" />
  
  <defs>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2" />
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#09090b" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Glow effect -->
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Grid / Complexity (representing old ERP) breaking apart on the left -->
  <g opacity="0.3">
    <path d="M 100 100 L 400 100 L 400 500 L 100 500 Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="10 10"/>
    <path d="M 150 150 L 350 150 M 150 200 L 300 200 M 150 250 L 350 250" stroke="#ffffff" stroke-width="4"/>
    <path d="M 150 350 L 350 350 M 150 400 L 300 400 M 150 450 L 350 450" stroke="#ffffff" stroke-width="4"/>
    <!-- Shattering effect -->
    <path d="M 380 150 L 450 120 M 400 250 L 480 200 M 390 400 L 500 450" stroke="#ffffff" stroke-width="2" stroke-dasharray="5 5"/>
  </g>

  <!-- Smooth conversational flow (representing AI/WhatsApp) on the right -->
  <g opacity="0.85">
    <path d="M 500 315 Q 700 100, 900 250 T 1150 300" fill="none" stroke="url(#flowGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M 450 350 Q 650 550, 850 400 T 1100 200" fill="none" stroke="#0ea5e9" stroke-width="4" stroke-opacity="0.5" stroke-linecap="round"/>
    
    <!-- Abstract chat bubbles nodes -->
    <circle cx="900" cy="250" r="20" fill="#0a0a12" stroke="#06b6d4" stroke-width="4"/>
    <circle cx="900" cy="250" r="8" fill="#0ea5e9"/>
    
    <circle cx="850" cy="400" r="30" fill="#0a0a12" stroke="#0ea5e9" stroke-width="4"/>
    <circle cx="850" cy="400" r="12" fill="#06b6d4"/>
    
    <circle cx="1100" cy="200" r="15" fill="#0ea5e9"/>
    
    <!-- Connection dots -->
    <circle cx="650" cy="225" r="4" fill="#06b6d4"/>
    <circle cx="720" cy="450" r="5" fill="#0ea5e9"/>
  </g>
</svg>
