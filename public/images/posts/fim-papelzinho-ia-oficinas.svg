<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090b" />
  
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3" />
    </linearGradient>
  </defs>

  <!-- Disintegrating paper shapes turning into digital nodes -->
  <g opacity="0.6">
    <!-- Flying "papers" on the left -->
    <path d="M 150 200 L 250 180 L 280 260 L 180 280 Z" fill="none" stroke="#666677" stroke-width="2" transform="rotate(-15 200 230)"/>
    <path d="M 150 210 L 230 195" stroke="#666677" stroke-width="1"/>
    <path d="M 150 230 L 210 215" stroke="#666677" stroke-width="1"/>
    
    <path d="M 300 400 L 380 430 L 350 510 L 270 480 Z" fill="none" stroke="#666677" stroke-width="2" stroke-dasharray="10 5" transform="rotate(25 325 455)"/>
    
    <!-- Transition particles -->
    <circle cx="450" cy="300" r="3" fill="#666677" />
    <circle cx="480" cy="250" r="4" fill="#06b6d4" />
    <circle cx="520" cy="400" r="5" fill="#0ea5e9" />
    <circle cx="580" cy="330" r="6" fill="#06b6d4" />

    <!-- Structured digital grid & database nodes on the right -->
    <rect x="700" y="150" width="300" height="300" rx="20" fill="none" stroke="url(#cyberGrad)" stroke-width="4" />
    
    <!-- Virtual rows -->
    <rect x="730" y="200" width="240" height="40" rx="8" fill="#0ea5e9" fill-opacity="0.2" stroke="#0ea5e9" stroke-width="1" />
    <rect x="730" y="270" width="240" height="40" rx="8" fill="#06b6d4" fill-opacity="0.3" stroke="#06b6d4" stroke-width="1" />
    <rect x="730" y="340" width="240" height="40" rx="8" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="5 5" />
    
    <!-- Floating nodes connecting -->
    <path d="M 600 330 L 700 300" stroke="#06b6d4" stroke-width="2" stroke-dasharray="5 5" opacity="0.8"/>
    <path d="M 520 400 L 700 360" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="5 5" opacity="0.8"/>
  </g>
</svg>
