<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a12" />
  
  <!-- Definitions for Gradients -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12" />
      <stop offset="100%" stop-color="#141424" />
    </linearGradient>
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Abstract Tech Grid & Network Lines -->
  <g opacity="0.6">
    <!-- Concentric radar-like circles on the right side -->
    <circle cx="950" cy="315" r="280" fill="none" stroke="url(#neonCyan)" stroke-width="1.5" opacity="0.2" />
    <circle cx="950" cy="315" r="200" fill="none" stroke="url(#neonBlue)" stroke-width="2" stroke-dasharray="12 6" opacity="0.4" />
    <circle cx="950" cy="315" r="140" fill="none" stroke="url(#neonCyan)" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.3" />
    <circle cx="950" cy="315" r="80" fill="none" stroke="url(#neonBlue)" stroke-width="1" opacity="0.5" />
    
    <!-- Abstract connected nodes -->
    <path d="M 600 200 L 750 150 L 950 315 L 850 480 L 650 400" fill="none" stroke="url(#neonCyan)" stroke-width="1.5" opacity="0.3" />
    
    <circle cx="600" cy="200" r="6" fill="#00f2fe" />
    <circle cx="750" cy="150" r="8" fill="#0ea5e9" />
    <circle cx="850" cy="480" r="5" fill="#06b6d4" />
    <circle cx="650" cy="400" r="7" fill="#00f2fe" opacity="0.8" />
    
    <!-- Flow indicators / floating boxes -->
    <rect x="730" y="135" width="40" height="30" rx="6" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.4" transform="rotate(15 750 150)" />
    <rect x="635" y="385" width="30" height="30" rx="6" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4" transform="rotate(-15 650 400)" />
    
    <!-- Fine digital grid lines -->
    <line x1="100" y1="0" x2="100" y2="630" stroke="#0ea5e9" stroke-width="0.5" opacity="0.08" />
    <line x1="300" y1="0" x2="300" y2="630" stroke="#0ea5e9" stroke-width="0.5" opacity="0.08" />
    <line x1="500" y1="0" x2="500" y2="630" stroke="#0ea5e9" stroke-width="0.5" opacity="0.08" />
    <line x1="700" y1="0" x2="700" y2="630" stroke="#0ea5e9" stroke-width="0.5" opacity="0.05" />
    
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#0ea5e9" stroke-width="0.5" opacity="0.08" />
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#0ea5e9" stroke-width="0.5" opacity="0.08" />
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#0ea5e9" stroke-width="0.5" opacity="0.08" />
  </g>
</svg>
