<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a12" />
  <g opacity="0.6">
    <!-- Connections -->
    <path d="M 600 315 L 300 200" stroke="#06b6d4" stroke-width="3" />
    <path d="M 600 315 L 900 200" stroke="#06b6d4" stroke-width="3" />
    <path d="M 600 315 L 300 450" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="5 5" />
    <path d="M 600 315 L 900 450" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="5 5" />
    
    <path d="M 300 200 L 200 100" stroke="#06b6d4" stroke-width="1" />
    <path d="M 900 200 L 1000 100" stroke="#06b6d4" stroke-width="1" />
    
    <!-- Central Node (Router) -->
    <circle cx="600" cy="315" r="80" fill="#06b6d4" fill-opacity="0.2" stroke="#06b6d4" stroke-width="5" />
    <circle cx="600" cy="315" r="60" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="10 10" />
    <circle cx="600" cy="315" r="20" fill="#06b6d4" />
    
    <!-- Outer Modules -->
    <rect x="220" y="150" width="160" height="100" rx="15" fill="#0a0a12" stroke="#06b6d4" stroke-width="3" />
    <rect x="820" y="150" width="160" height="100" rx="15" fill="#0a0a12" stroke="#0ea5e9" stroke-width="3" />
    <rect x="220" y="400" width="160" height="100" rx="15" fill="#0a0a12" stroke="#0ea5e9" stroke-width="3" stroke-dasharray="8 4" />
    <rect x="820" y="400" width="160" height="100" rx="15" fill="#0a0a12" stroke="#06b6d4" stroke-width="3" stroke-dasharray="8 4" />
    
    <!-- Particles -->
    <circle cx="450" cy="257" r="6" fill="#ffffff" />
    <circle cx="750" cy="257" r="6" fill="#ffffff" />
  </g>
</svg>
